# Render blueprint — deploys the FIOS FastAPI backend with Postgres + Redis.
# Docs: https://render.com/docs/blueprint-spec
#
# One-time setup: Render dashboard -> New -> Blueprint -> connect this repo.
# Render reads this file, provisions the database, key-value store, and web
# service, and wires the env vars below automatically. The only value you may
# want to change later is FIOS_CORS_ORIGINS (your frontend origin).

databases:
  - name: fios-postgres
    databaseName: fios
    user: fios
    plan: free

services:
  # Redis / Key Value store (rate limiting + chat history). Internal-only.
  - type: redis
    name: fios-redis
    plan: free
    ipAllowList: []

  # FastAPI backend, built from backend/Dockerfile.
  - type: web
    name: fios-api
    runtime: docker
    plan: free
    # Paths are relative to the repository root (the backend lives in backend/).
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    # Apply migrations, then serve on the port Render assigns.
    dockerCommand: 'sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"'
    envVars:
      - key: FIOS_ENVIRONMENT
        value: production
      # Strong random secret generated by Render (never committed).
      - key: FIOS_JWT_SECRET_KEY
        generateValue: true
      # Allow the deployed frontend to call the API (comma-separated for more).
      - key: FIOS_CORS_ORIGINS
        value: https://salamanca-one.vercel.app
      # Postgres connection, sourced from the managed database above.
      - key: FIOS_POSTGRES_HOST
        fromDatabase:
          name: fios-postgres
          property: host
      - key: FIOS_POSTGRES_PORT
        fromDatabase:
          name: fios-postgres
          property: port
      - key: FIOS_POSTGRES_USER
        fromDatabase:
          name: fios-postgres
          property: user
      - key: FIOS_POSTGRES_PASSWORD
        fromDatabase:
          name: fios-postgres
          property: password
      - key: FIOS_POSTGRES_DB
        fromDatabase:
          name: fios-postgres
          property: database
      # Redis connection string, sourced from the key-value store above.
      - key: FIOS_REDIS_URL
        fromService:
          type: redis
          name: fios-redis
          property: connectionString
